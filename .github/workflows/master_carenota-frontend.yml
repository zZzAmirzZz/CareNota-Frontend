name: Deploy CareNota Frontend

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: ./CaraNota
        run: npm ci

      - name: Build Angular app
        working-directory: ./CaraNota
        run: npm run build -- --configuration production

      - name: Create startup script
        run: |
          echo '{"scripts": {"start": "serve -s browser -l 8080"}, "dependencies": {"serve": "^14.0.0"}}' > ./CaraNota/dist/CaraNota/package.json

      - name: Zip dist output
        run: |
          cd ./CaraNota/dist/CaraNota
          zip -r ../../../app.zip .

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'carenota-frontend'
          package: ./app.zip
