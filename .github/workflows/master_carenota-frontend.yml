name: Deploy CareNota Frontend

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: ./CaraNota
        run: npm ci

      - name: Build Angular app
        working-directory: ./CaraNota
        run: npm run build -- --configuration production

      - name: Show dist folder contents
        if: always()
        run: |
          echo "=== dist folder ==="
          find ./CaraNota/dist -type f 2>/dev/null | head -30 || echo "NO DIST FOLDER"

      - name: Zip dist output
        run: |
          cd ./CaraNota/dist/CaraNota/browser
          zip -r ../../../../app.zip .

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'carenota-frontend'
          package: ./app.zip
