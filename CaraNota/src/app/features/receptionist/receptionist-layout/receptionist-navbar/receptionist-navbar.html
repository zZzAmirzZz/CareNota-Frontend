<!-- src/app/features/receptionist/layout/receptionist-navbar/receptionist-navbar.html -->

<nav class="bg-sky-card   border-b border-gray-100 px-4 py-2 flex items-center justify-between shrink-0">

  <!-- Logo -->
<div class="flex items-center gap-2">
<img
  src="images/logo_navbar.png"
  alt="CareNota"
  class="h-12 w-auto object-contain"
  style="mix-blend-mode: multiply; filter: brightness(1.15) contrast(1.1);" />
  </div>

  <!-- Right: greeting + bell -->
  <div class="flex items-center gap-4">
    <span class="text-sm text-gray-600">
      Hi, <span class="font-semibold text-[#0f1f3d]">{{ userName }}!</span>
    </span>

    <!-- Bell using SVG so it never shows as text -->
    <button class="relative w-9 h-9 flex items-center justify-center
                   rounded-full hover:bg-gray-100 transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-gray-500" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
      <span class="absolute top-1 right-1 w-4 h-4 bg-red-500 text-white
                   text-[10px] font-bold rounded-full flex items-center justify-center">
        3
      </span>
    </button>
  </div>

</nav>
