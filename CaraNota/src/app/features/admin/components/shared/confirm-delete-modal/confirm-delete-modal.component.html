@if (visible) {
  <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/40">
    <div class="bg-white rounded-2xl shadow-xl w-80 p-6 border border-gray-100">

      <!-- Icon -->
      <div class="w-11 h-11 rounded-full bg-red-50 flex items-center justify-center mb-4">
        <svg class="w-5 h-5 text-red-600" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14H6L5 6"/>
          <path d="M10 11v6"/><path d="M14 11v6"/>
          <path d="M9 6V4h6v2"/>
        </svg>
      </div>

      <h3 class="text-base font-semibold text-gray-800 mb-1">Delete account?</h3>
      <p class="text-sm text-gray-500 mb-5">
        Remove <span class="font-medium text-gray-700">{{ name }}</span>?
        This action cannot be undone.
      </p>

      <div class="flex gap-3">
        <button
          (click)="cancelled.emit()"
          class="flex-1 py-2 text-sm text-gray-600 bg-gray-100 rounded-lg hover:bg-gray-200 transition-colors"
        >
          Cancel
        </button>
        <button
          (click)="confirmed.emit()"
          class="flex-1 py-2 text-sm font-medium text-white bg-red-600 rounded-lg hover:bg-red-700 transition-colors"
        >
          Delete
        </button>
      </div>

    </div>
  </div>
}
