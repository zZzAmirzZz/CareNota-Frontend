<!-- src/app/features/patient/components/upcoming-appointment/upcoming-appointment.component.html -->
<div class="flex items-center gap-3 bg-blue-50 rounded-2xl px-5 py-4 border border-blue-100">

  <!-- Calendar icon -->
  <div class="w-9 h-9 rounded-full bg-blue-600 flex items-center justify-center shrink-0">
    <svg class="w-4 h-4 text-white" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
      <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
      <line x1="3" y1="10" x2="21" y2="10"/>
    </svg>
  </div>

  <div>
    <p class="text-sm font-semibold text-gray-900">{{ appointment.doctorName }}</p>
    <p class="text-xs text-gray-400">{{ appointment.appointmentType }}</p>
    <p class="text-xs text-gray-500 mt-0.5">{{ formatDateTime(appointment.startTime) }}</p>
  </div>

</div>
