<!-- src/app/features/patient/components/navbar/navbar.component.html -->
<nav class="bg-white border-b border-gray-100 px-6 py-3 flex items-center justify-between">

  <!-- Logo -->
  <div class="flex items-center gap-2">
    <img
      src="images/logo_navbar.png"
      alt="CareNota"
      class="h-12 w-auto object-contain"
      style="mix-blend-mode: multiply; filter: brightness(1.15) contrast(1.1);"
    />
  </div>

  <!-- Nav links -->
  <div class="flex items-center gap-1">
    <a routerLink="/patient/home" routerLinkActive="text-blue-600 border-b-2 border-blue-600"
       class="flex items-center gap-1.5 px-3 py-2 text-sm text-gray-500 hover:text-blue-600 transition-colors">
      <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      Home
    </a>

    <a routerLink="/patient/visits" routerLinkActive="text-blue-600 border-b-2 border-blue-600"
       class="flex items-center gap-1.5 px-3 py-2 text-sm text-gray-500 hover:text-blue-600 transition-colors">
      <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
        <polyline points="10 9 9 9 8 9"/>
      </svg>
      Visits
    </a>

    <a routerLink="/patient/profile" routerLinkActive="text-blue-600 border-b-2 border-blue-600"
       class="flex items-center gap-1.5 px-3 py-2 text-sm text-gray-500 hover:text-blue-600 transition-colors">
      <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      Profile
    </a>
  </div>

  <!-- Right: logout -->
  <div class="flex items-center gap-3">
    <!-- User avatar -->
    <button class="w-9 h-9 rounded-full bg-blue-100 flex items-center justify-center
                   text-blue-700 font-semibold text-sm">
      S
    </button>

    <!-- Logout -->
    <button (click)="logout()"
            class="flex items-center gap-1.5 text-sm text-gray-500 hover:text-red-500 transition-colors">
      <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      Logout
    </button>
  </div>

</nav>
