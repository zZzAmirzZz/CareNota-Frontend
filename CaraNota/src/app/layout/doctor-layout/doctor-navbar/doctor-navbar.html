<!-- src/app/layout/doctor-layout/doctor-navbar/doctor-navbar.html -->
<nav class="bg-sky-card border border-gray-200 rounded-2xl px-6 mx-4 mt-4 h-14
            flex items-center justify-between shadow-sm">

  <!-- Logo -->
  <a routerLink="/doctor" class="flex items-center gap-2 shrink-0">
    <img src="images/logo_navbar.png" alt="CareNota"
         class="h-12 w-auto object-contain"
         style="mix-blend-mode: multiply; filter: brightness(1.15) contrast(1.1);" />
  </a>

  <!-- Search -->
  <div class="flex items-center bg-gray-50 border border-gray-200 rounded-full
              px-4 h-9 gap-2 w-60 focus-within:border-blue-400 focus-within:bg-white transition-all">
    <svg class="w-3.5 h-3.5 text-amber-400 shrink-0" fill="currentColor" viewBox="0 0 20 20">
      <path fill-rule="evenodd"
        d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0
           01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/>
    </svg>
    <input type="text" placeholder="Search patients, appointments…"
           class="bg-transparent outline-none text-xs text-gray-500 w-full placeholder:text-gray-400" />
  </div>

  <!-- Right side -->
  <div class="flex items-center gap-2">

    <!-- Healthcare Services dropdown -->
    <div class="relative navbar-services-menu">
      <button (click)="toggleServices()"
              class="flex items-center gap-1.5 text-gray-600 font-medium text-sm px-3 py-1.5
                     rounded-lg hover:bg-gray-100 hover:text-blue-700 transition-colors">
        Healthcare Services
        <svg class="w-3.5 h-3.5 text-gray-400 transition-transform duration-200"
             [class.rotate-180]="servicesOpen"
             fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
        </svg>
      </button>

      @if (servicesOpen) {
        <div class="absolute top-10 right-0 bg-white rounded-xl shadow-lg
                    border border-gray-100 py-1.5 w-52 z-50">
          @for (s of services; track s.label) {
            <div class="flex items-center gap-2.5 px-4 py-2 text-sm text-gray-600
                        hover:bg-blue-50 hover:text-blue-700 transition-colors cursor-pointer"
                 [routerLink]="s.route"
                 (click)="servicesOpen = false">
              <span class="w-1.5 h-1.5 rounded-full bg-blue-200 shrink-0"></span>
              {{ s.label }}
            </div>
          }
        </div>
      }
    </div>

    <!-- Divider -->
    <div class="w-px h-5 bg-gray-200 mx-1"></div>

    <!-- Notifications -->
    <div class="relative">
      <button class="w-8 h-8 rounded-lg border border-gray-200 flex items-center justify-center
                     text-gray-500 hover:bg-gray-100 transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6 6 0 10-12 0v3.159c0
               .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
        </svg>
      </button>
      <span class="absolute top-0 right-0 w-2 h-2 bg-red-400 rounded-full border-2 border-white"></span>
    </div>

    <!-- Avatar + Profile Dropdown -->
    <div class="relative navbar-profile-menu">
      <button (click)="toggleProfile()"
              [title]="doctorName()"
              class="w-8 h-8 rounded-full bg-gradient-to-br from-blue-400 to-blue-700
                     text-white text-xs font-semibold flex items-center justify-center
                     hover:shadow-md hover:shadow-blue-200/60 transition-all
                     ring-2 ring-transparent hover:ring-blue-300">
        {{ doctorInitials() }}
      </button>

      @if (profileOpen()) {
        <div class="absolute top-11 right-0 bg-white rounded-2xl shadow-xl
                    border border-gray-100 py-2 w-56 z-50">

          <!-- Doctor header -->
          <div class="px-4 py-3 border-b border-gray-50">
            <div class="flex items-center gap-3">
              <div class="w-10 h-10 rounded-full bg-gradient-to-br from-blue-400 to-blue-700
                          text-white text-sm font-bold flex items-center justify-center shrink-0">
                {{ doctorInitials() }}
              </div>
              <div class="min-w-0">
                <p class="text-sm font-semibold text-gray-900 truncate">Dr. {{ doctorName() }}</p>
                <p class="text-xs text-gray-400">ID #{{ doctorId() }}</p>
              </div>
            </div>
          </div>

          <!-- Menu items -->
          <div class="py-1">
            <button (click)="goToProfile()"
                    class="w-full flex items-center gap-3 px-4 py-2.5 text-sm text-gray-700
                           hover:bg-blue-50 hover:text-blue-700 transition-colors text-left">
              <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                  d="M5.121 17.804A13.937 13.937 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0
                     11-6 0 3 3 0 016 0zm6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
              </svg>
              View Profile
            </button>

            <a routerLink="/doctor/scheduling" (click)="profileOpen.set(false)"
               class="flex items-center gap-3 px-4 py-2.5 text-sm text-gray-700
                      hover:bg-blue-50 hover:text-blue-700 transition-colors">
              <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                  d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
              </svg>
              My Schedule
            </a>
          </div>

          <!-- Sign out -->
          <div class="border-t border-gray-50 pt-1">
            <button (click)="logout()"
                    class="w-full flex items-center gap-3 px-4 py-2.5 text-sm
                           text-red-600 hover:bg-red-50 transition-colors">
              <svg class="w-4 h-4 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                  d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
              </svg>
              Sign Out
            </button>
          </div>

        </div>
      }
    </div>

  </div>
</nav>
